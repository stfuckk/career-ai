services:
  postgres:
    image: postgres:17
    container_name: career_guidance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: career_guidance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d career_guidance']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
